# Copy to deploy/envs/dev.conf or .deploy-dev.conf and fill secrets.
# Files matching deploy/envs/*.conf and .deploy-*.conf are ignored by git.

DEPLOY_HOST=172.16.0.160
SSH_USER=root
SSH_PASSWORD=change-me
DEPLOY_DIR=/data/intelli/engine
DEPLOY_LOG_DIR=/data/log/intelli/engine
SERVICE_NAME=intelli-engine
SERVICE_PORT=2026
GATEWAY_WORKERS=4

# Default true. Stops existing listeners on SERVICE_PORT, 8005, and 3001
# before starting systemd services. This prevents old manual deployments from
# keeping the public port attached to another directory.
KILL_PORT_CONFLICTS=true

# Visual asset image generation.
VISUAL_ASSET_IMAGE_PROVIDER=external-generate
VISUAL_ASSET_EXTERNAL_IMAGE_URL=http://10.8.5.222:8010/generate
VISUAL_ASSET_IMAGE_TIMEOUT_SECONDS=180

# Starfish data-source sync.
STARFISH_API_URL=http://172.16.0.160:25019/dip/data-sources/ai/list/{conversation_id}
